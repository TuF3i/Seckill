# 哨兵监听端口
port 26379
# 关闭保护模式，允许其他节点连接
protected-mode no
# 监控名为 "mymaster" 的主节点，IP为redis-master，端口6379
# 最后的数字 "2" 是法定票数（quorum），表示至少需要2个哨兵同意，才确认主节点客观下线[reference:5][reference:6]
sentinel monitor cluster-master redis-master 6379 2
# 主节点访问密码
sentinel auth-pass cluster-master root
# 判定主节点失效的超时时间（毫秒），默认30秒
sentinel down-after-milliseconds cluster-master 30000
# 故障转移超时时间（毫秒）
sentinel failover-timeout cluster-master 180000
# 故障转移时，允许多少个从节点同时同步新主节点
sentinel parallel-syncs cluster-master 1
sentinel resolve-hostnames yes
