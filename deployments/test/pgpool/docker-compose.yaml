services:
  pg-0:
    image: bitnami/postgresql-repmgr:17
    container_name: "pg-0"
    ports:
      - 5433:5432
    volumes:
      - ./data/data-0:/bitnami/postgresql
    networks:
      - pgpool
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=root
      - POSTGRESQL_USERNAME=root
      - POSTGRESQL_PASSWORD=root
      - POSTGRESQL_DATABASE=root
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - REPMGR_USERNAME=repmgr
      - REPMGR_PASSWORD=repmgr
      - REPMGR_PRIMARY_HOST=pg-0
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-0,pg-1:5432
      - REPMGR_NODE_NAME=pg-0
      - REPMGR_NODE_NETWORK_NAME=pg-0
      - REPMGR_PORT_NUMBER=5432
    restart: always
  pg-1:
    image: bitnami/postgresql-repmgr:17
    container_name: "pg-1"
    ports:
      - 5434:5432
    volumes:
      - ./data/data-1:/bitnami/postgresql
    networks:
      - pgpool
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=root
      - POSTGRESQL_USERNAME=root
      - POSTGRESQL_PASSWORD=root
      - POSTGRESQL_DATABASE=root
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - REPMGR_USERNAME=repmgr
      - REPMGR_PASSWORD=repmgr
      - REPMGR_PRIMARY_HOST=pg-0
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-0,pg-1:5432
      - REPMGR_NODE_NAME=pg-1
      - REPMGR_NODE_NETWORK_NAME=pg-1
      - REPMGR_PORT_NUMBER=5432
    restart: always
  pgpool:
    image: bitnami/pgpool:4.6
    container_name: "pgpool"
    ports:
      - 5432:5432
    volumes:
      - ./conf/myconf.conf:/config/myconf.conf
    networks: 
      - pgpool
      - redrock
    environment:
      - PGPOOL_USER_CONF_FILE=/config/myconf.conf
      - PGPOOL_BACKEND_NODES=0:pg-0:5432,1:pg-1:5432
      - PGPOOL_SR_CHECK_USER=repmgr
      - PGPOOL_SR_CHECK_PASSWORD=repmgr
      - PGPOOL_ENABLE_LDAP=no
      - PGPOOL_POSTGRES_USERNAME=postgres
      - PGPOOL_POSTGRES_PASSWORD=root
      - PGPOOL_ADMIN_USERNAME=admin
      - PGPOOL_ADMIN_PASSWORD=root
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
      - PGPOOL_POSTGRES_CUSTOM_USERS=root
      - PGPOOL_POSTGRES_CUSTOM_PASSWORDS=root
    restart: always
    healthcheck:
      test: ["CMD", "/opt/bitnami/scripts/pgpool/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  pgpool:
    external: true
  redrock:
    external: true
